          - heading "1.等于操作符" [level=1] [ref=e39]
          - paragraph [ref=e40]: 等于操作符用两个等于号（==）表示，如果操作数相等，则会返回true
          - paragraph [ref=e41]: 前面文章，我们提到在JavaScript中存在隐式转换。等于操作符（==）在比较中会先进行类型转换，再确定操作数是否相等
          - paragraph [ref=e42]: 遵循以下规则：
          - paragraph [ref=e43]: 如果任一操作数是布尔值，则将其转换为数值再比较是否相等
          - paragraph [ref=e44]: 如果一个操作数是字符串，另一个操作数是数值，则尝试将字符串转换为数值，再比较是否相等
          - paragraph [ref=e45]: 如果一个操作数是对象，另一个操作数不是，则调用对象的valueOf()方法取得其原始值，再根据前面的规则进行比较
          - paragraph [ref=e46]: null和undefined相等
          - paragraph [ref=e47]: 如果有任一操作数是NaN，则相等操作符返回false
          - paragraph [ref=e48]: 如果两个操作数都是对象，则比较它们是不是同一个对象。如果两个操作数都指向同一个对象，则相等操作符返回true
          - paragraph [ref=e49]: 下面进一步做个小结：
          - list [ref=e50]:
            - listitem [ref=e51]: 两个都为简单类型，字符串和布尔值都会转换成数值，再比较
            - listitem [ref=e52]: 简单类型与引用类型比较，对象转化成其原始类型的值，再比较
            - listitem [ref=e53]: 两个值都为引用类型，则比较它们是否指向同一个对象
            - listitem [ref=e54]: null和undefined相等
            - listitem [ref=e55]: 存在NaN则返回false
          - heading "2.全等操作符" [level=1] [ref=e56]
          - paragraph [ref=e57]: 全等操作符由3个等于号（===）表示，只有两个操作数在不转换的前提下相等才返回true。即类型相同，值也相同
          - paragraph [ref=e58]: undefined 和 null 与自身严格相等
          - heading "3.区别" [level=1] [ref=e59]
          - paragraph [ref=e60]: 相等操作符（==）会做类型转换，再进行值的比较，全等运算符不会做类型转换
          - paragraph [ref=e61]: null 和 undefined 比较，相等操作符（==）为true，全等为false
          - heading "4.小结" [level=1] [ref=e62]
          - paragraph [ref=e63]: 相等运算符隐藏的类型转换，会带来一些违反直觉的结果
          - paragraph [ref=e64]: 但在比较null的情况的时候，我们一般使用相等操作符==
          - paragraph [ref=e65]: 等同于下面写法 使用相等操作符（==）的写法明显更简洁了
          - paragraph [ref=e66]: 所以，除了再比较对象属性为null或者undefined的情况下，我们可以使用相等操作符（==），其他情况一律使用全等操作符
